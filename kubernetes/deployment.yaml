apiVersion: apps/v1
kind: Deployment
metadata:
  name: csao-inference
  namespace: recommendation
  labels:
    app: csao-inference
spec:
  replicas: 10
  selector:
    matchLabels:
      app: csao-inference
  template:
    metadata:
      labels:
        app: csao-inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: csao-inference
        image: mealmind/csao-inference:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_URL
          value: "redis://redis-cluster.internal:6379/0"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
